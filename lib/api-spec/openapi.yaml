openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: rota
    description: Rota management and AI generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /rota/generate:
    post:
      operationId: generateRota
      tags: [rota]
      summary: AI-generate a monthly rota
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRotaRequest"
      responses:
        "200":
          description: Generated rota assignments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateRotaResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    RotaStaffMember:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        contractedHours:
          type: number
        role:
          type: string
      required: [id, name, contractedHours, role]
    ExistingShift:
      type: object
      properties:
        staffId:
          type: string
        date:
          type: string
        shiftType:
          type: string
      required: [staffId, date, shiftType]
    GenerateRotaRequest:
      type: object
      properties:
        month:
          type: integer
          minimum: 1
          maximum: 12
        year:
          type: integer
        team:
          type: string
        staff:
          type: array
          items:
            $ref: "#/components/schemas/RotaStaffMember"
        minDayCoverage:
          type: integer
          default: 2
        minDaySleepCoverage:
          type: integer
          default: 2
        minNightCoverage:
          type: integer
          default: 2
        notes:
          type: string
        existingShifts:
          type: array
          items:
            $ref: "#/components/schemas/ExistingShift"
      required: [month, year, staff]
    GeneratedShift:
      type: object
      properties:
        staffId:
          type: string
        date:
          type: string
        shiftType:
          type: string
        hours:
          type: number
      required: [staffId, date, shiftType, hours]
    GenerateRotaResponse:
      type: object
      properties:
        shifts:
          type: array
          items:
            $ref: "#/components/schemas/GeneratedShift"
        summary:
          type: string
        warnings:
          type: array
          items:
            type: string
      required: [shifts, summary]
